<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halal Finance Manager Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
      body.screen-canvas {
        min-height: 100vh;
      }

      .single-shell {
        width: min(980px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 42px 0 52px;
      }

      .single-header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 20px;
        margin-bottom: 28px;
        padding: 22px 24px;
        border-radius: 28px;
        border: 1px solid rgba(95, 141, 116, 0.18);
        background: rgba(255, 252, 246, 0.72);
        box-shadow: var(--shadow);
      }

      .single-header h1 {
        max-width: none;
        font-size: clamp(2rem, 4vw, 3.4rem);
      }

      .single-subtitle {
        max-width: 42ch;
        margin-top: 10px;
      }

      .screen-stage {
        display: flex;
        justify-content: center;
      }

      .screen-stage .phone {
        min-height: 844px;
      }

      .screen-stage img {
        display: block;
        width: min(100%, 760px);
        height: auto;
        border-radius: 32px;
        box-shadow: 0 26px 68px rgba(24, 54, 43, 0.12);
      }

      .loading-note {
        padding: 28px;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .single-shell {
          width: min(100vw - 24px, 560px);
          padding-top: 20px;
        }

        .single-header {
          display: block;
        }
      }
    </style>
  </head>
  <body class="screen-canvas">
    <main class="single-shell">
      <section class="single-header">
        <div>
          <p class="eyebrow">Halal Finance Manager</p>
          <h1 id="screen-title">Loading screen...</h1>
          <p class="intro single-subtitle" id="screen-description">
            Preparing a focused capture for Figma.
          </p>
        </div>
        <div class="tone-card">
          <span class="tone-label">Capture mode</span>
          <span id="screen-tag">Single mobile screen</span>
        </div>
      </section>

      <section class="screen-stage" id="screen-stage">
        <div class="loading-note">Loading screen layout...</div>
      </section>
    </main>

    <script>
      (() => {
        const screenMeta = {
          onboarding: {
            title: "Onboarding",
            description:
              "First-touch experience for values-aligned budgeting, halal investing, and zakat planning.",
          },
          dashboard: {
            title: "Dashboard",
            description:
              "At-a-glance spending overview, progress cards, and quick actions for daily use.",
          },
          budget: {
            title: "Budget Tracker",
            description:
              "Monthly categories, spend pacing, and progress indicators with gentle financial guardrails.",
          },
          transactions: {
            title: "Transactions",
            description:
              "Recent activity with flagged reviews, recurring spend, and halal-compliance follow-up cues.",
          },
          invest: {
            title: "Halal Stock Screener",
            description:
              "Ticker search, compliance result, and purification guidance for halal investing workflows.",
          },
          goals: {
            title: "Savings Goals",
            description:
              "Purpose-driven saving for emergency funds, Umrah, and milestone planning.",
          },
          insights: {
            title: "Insights",
            description:
              "Weekly financial patterns, reminders, and action-oriented coaching moments.",
          },
          profile: {
            title: "Profile & Settings",
            description:
              "Preferences, compliance method, reminders, linked accounts, and support access.",
          },
        };

        const installFetchProbe = () => {
          if (window.__singleCaptureProbeInstalled) {
            return;
          }

          const originalFetch = window.fetch.bind(window);
          window.__singleCaptureProbeInstalled = true;

          window.fetch = async (...args) => {
            const request = args[0];
            const url =
              typeof request === "string"
                ? request
                : request && typeof request.url === "string"
                  ? request.url
                  : "";

            if (url.includes("mcp.figma.com/mcp/capture/")) {
              document.documentElement.dataset.captureRequest = url;
            }

            try {
              const response = await originalFetch(...args);

              if (url.includes("mcp.figma.com/mcp/capture/")) {
                document.documentElement.dataset.captureHttpStatus = String(
                  response.status
                );
              }

              return response;
            } catch (error) {
              if (url.includes("mcp.figma.com/mcp/capture/")) {
                document.documentElement.dataset.captureFetchError =
                  error instanceof Error ? error.message : String(error);
              }

              throw error;
            }
          };
        };

        const getParams = () => {
          const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
          const query = new URLSearchParams(window.location.search);

          return {
            screen: query.get("screen") || hash.get("screen") || "dashboard",
            captureId: hash.get("figmacapture") || query.get("captureId"),
            endpoint: hash.get("figmaendpoint") || query.get("endpoint"),
            selector:
              hash.get("figmaselector") || query.get("selector") || "body",
            delayMs: Number(
              hash.get("figmadelay") || query.get("delayMs") || 1000
            ),
          };
        };

        const renderScreen = async () => {
          const params = getParams();
          const meta = screenMeta[params.screen] || screenMeta.dashboard;

          document.title = `Halal Finance Manager - ${meta.title}`;
          document.getElementById("screen-title").textContent = meta.title;
          document.getElementById("screen-description").textContent =
            meta.description;
          document.getElementById("screen-tag").textContent = `${meta.title} capture`;

          const stage = document.getElementById("screen-stage");
          stage.innerHTML = "";

          if (params.captureId) {
            const image = document.createElement("img");
            image.src = `./renders/${params.screen}.png`;
            image.alt = `${meta.title} screen`;
            stage.appendChild(image);
            return params;
          }

          const response = await fetch("./index.html");
          const html = await response.text();
          const doc = new DOMParser().parseFromString(html, "text/html");
          const screen = doc.querySelector(`[data-screen="${params.screen}"]`);

          if (!screen) {
            stage.innerHTML =
              '<div class="loading-note">Screen template not found.</div>';
            return params;
          }

          stage.appendChild(screen);
          return params;
        };

        const startCapture = async () => {
          const params = await renderScreen();

          if (!params.captureId || !params.endpoint || window.__screenCaptureStarted) {
            return;
          }

          const captureFn = window.figma && window.figma.captureForDesign;
          if (typeof captureFn !== "function") {
            window.setTimeout(startCapture, 250);
            return;
          }

          window.__screenCaptureStarted = true;
          installFetchProbe();
          document.documentElement.dataset.captureStatus = "started";

          try {
            await captureFn({
              captureId: params.captureId,
              endpoint: params.endpoint,
              selector: params.selector,
              delayMs: params.delayMs,
              verbose: true,
            });
            document.documentElement.dataset.captureStatus = "success";
          } catch (error) {
            console.error("Screen capture bootstrap failed", error);
            window.__screenCaptureStarted = false;
            document.documentElement.dataset.captureStatus = "error";
            document.documentElement.dataset.captureError =
              error instanceof Error ? error.message : String(error);
          }
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", startCapture, {
            once: true,
          });
        } else {
          startCapture();
        }
      })();
    </script>
  </body>
</html>
